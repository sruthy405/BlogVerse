{% extends 'base.html' %}
{% block title %}Create Blog | BlogVerse{% endblock %}
{% block content %}
<style>
    .create-wrap {
        display: flex;
        justify-content: center;
        padding: 30px 10px 60px;
        position: relative;
    }

    /* doodles */
    .doodle {
        position: absolute;
        z-index: 0;
        opacity: .9;
        animation: bob 6s ease-in-out infinite;
    }

    .doodle-plane {
        width: 46px;
        top: -6px;
        left: 6%;
    }

    .doodle-swirl {
        width: 40px;
        bottom: 10px;
        left: 3%;
        animation-delay: .6s;
    }

    .doodle-birds {
        width: 54px;
        top: -4px;
        right: 6%;
        animation-delay: 1s;
    }

    .doodle-dot1 {
        width: 14px;
        bottom: 30px;
        right: 8%;
        animation-delay: 1.4s;
    }

    @keyframes bob {

        0%,
        100% {
            transform: translateY(0) rotate(0deg);
        }

        50% {
            transform: translateY(-8px) rotate(4deg);
        }
    }

    .create-card {
        position: relative;
        z-index: 1;
        background: #f7f9f2;
        border: 2px solid #111111;
        border-radius: 20px;
        padding: 38px 40px;
        max-width: 640px;
        width: 100%;
        box-shadow: 6px 6px 0 rgba(17, 17, 17, .12);
        text-align: center;
    }

    .create-tag {
        display: inline-block;
        background: #ffffff;
        border: 2px solid #111111;
        border-radius: 40px 40px 40px 4px;
        padding: 6px 24px;
        font-family: 'Caveat', cursive;
        font-size: 1.3rem;
        font-weight: 700;
        color: #111111;
        margin-bottom: 12px;
        transform: rotate(-2deg);
    }

    .create-card h2 {
        font-family: 'Caveat', cursive;
        font-size: 2.2rem;
        font-weight: 700;
        color: #14210f;
        margin-bottom: 28px;
    }

    .field-row {
        text-align: left;
        margin-bottom: 20px;
    }

    .field-row label {
        display: block;
        font-size: .8rem;
        font-weight: 700;
        letter-spacing: .5px;
        text-transform: uppercase;
        color: #4c6b3a;
        margin-bottom: 6px;
    }

    select,
    textarea {
        width: 100%;
        padding: 11px 14px;
        border: 2px solid #111111;
        border-radius: 10px;
        background: #ffffff;
        font-size: .95rem;
        font-family: 'Poppins', sans-serif;
        color: #14210f;
        outline: none;
        transition: all .2s ease;
    }

    select:focus,
    textarea:focus {
        background: #eef3e4;
        box-shadow: 3px 3px 0 rgba(17, 17, 17, .15);
        transform: translate(-1px, -1px);
    }

    textarea {
        resize: vertical;
        min-height: 260px;
        line-height: 1.6;
    }

    .btn-submit {
        width: 100%;
        margin-top: 6px;
        padding: 13px 0;
        border-radius: 40px 40px 40px 4px;
        border: 2px solid #111111;
        background: #b8cf9e;
        color: #14210f;
        font-size: 1rem;
        font-weight: 700;
        font-family: 'Poppins', sans-serif;
        letter-spacing: .3px;
        cursor: pointer;
        box-shadow: 3px 3px 0 rgba(17, 17, 17, .15);
        transition: all .25s ease;
    }

    .btn-submit:hover {
        background: #4c6b3a;
        color: #ffffff;
        transform: translate(-2px, -2px);
        box-shadow: 5px 5px 0 rgba(17, 17, 17, .2);
    }

    @media (max-width:640px) {
        .create-card {
            padding: 28px 22px;
        }

        .doodle {
            transform: scale(.7);
        }
    }
</style>

<div class="create-wrap">
    <svg class="doodle doodle-plane" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 30 L50 12 L34 30 L50 48 Z" fill="none" stroke="#111111" stroke-width="2" stroke-linejoin="round" />
        <path d="M50 12 Q56 20 50 30 Q56 40 50 48" fill="none" stroke="#111111" stroke-width="1.5" />
    </svg>
    <svg class="doodle doodle-swirl" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 20 Q8 8 20 8 Q32 8 32 20 Q32 30 22 30 Q14 30 14 22" fill="none" stroke="#4c6b3a" stroke-width="2"
            stroke-linecap="round" />
    </svg>
    <svg class="doodle doodle-birds" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 15 Q12 5 19 15 Q26 5 33 15" fill="none" stroke="#111111" stroke-width="2" />
        <path d="M32 20 Q37 12 42 20 Q47 12 52 20" fill="none" stroke="#111111" stroke-width="1.5" />
    </svg>
    <svg class="doodle doodle-dot1" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="4" fill="#4c6b3a" />
    </svg>

    <div class="create-card">
        <span class="create-tag">New Entry</span>
        <h2>Welcome {{ current_user.username }}</h2>

        <form action="" method="POST">
            <div class="field-row">
                <label for="category_id">Select the Category</label>
            <select id="category_id" name="category_id" required>
                <option value="" selected disabled>-- Select Category --</option>
            
                {% for a_category in all_category_id %}
                <option value="{{ a_category }}">
                    {{ all_category_name[loop.index0] }}
                </option>
                {% endfor %}
            </select>
            </div>

            <div class="field-row">
                <label for="blog_text">Blog Content</label>
                <textarea id="blog_text" name="blog_text" placeholder="Write your thoughts ..."></textarea>
            </div>

            <input class="btn-submit" type="submit" value="Insert">
        </form>
    </div>
</div>
{% endblock %}
